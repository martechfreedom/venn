<script>
    // ============================================
    // CONFIGURAÇÃO INICIAL
    // ============================================
    
    // Verificar se venn.js carregou corretamente
    window.addEventListener('load', () => {
        console.log('=== VERIFICAÇÃO ===');
        console.log('D3.js:', typeof d3 !== 'undefined' ? '✅' : '❌');
        console.log('venn.js:', typeof venn !== 'undefined' ? '✅' : '❌');
        console.log('venn.VennDiagram:', typeof venn?.VennDiagram);
        
        if (typeof venn !== 'undefined') {
            console.log('Métodos venn disponíveis:', Object.keys(venn));
        }
    });

    // Atualizar preview de cor
    ['A', 'B', 'C'].forEach(set => {
        const input = document.getElementById(`color${set}`);
        if (input) {
            input.addEventListener('input', (e) => {
                document.getElementById(`color${set}-hex`).textContent = e.target.value;
            });
        }
    });

    // ============================================
    // FUNÇÕES DE INTERFACE
    // ============================================

    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    // ============================================
    // GERAR DIAGRAMA (PRINCIPAL)
    // ============================================

    function gerarDiagrama() {
        console.log('🎨 Gerando diagrama...');
        
        try {
            const nameA = document.getElementById('nameA').value || 'A';
            const nameB = document.getElementById('nameB').value || 'B';
            const nameC = document.getElementById('nameC').value || 'C';
            
            const sizeA = parseInt(document.getElementById('sizeA').value) || 0;
            const sizeB = parseInt(document.getElementById('sizeB').value) || 0;
            const sizeC = parseInt(document.getElementById('sizeC').value) || 0;
            
            const intersectionAB = parseInt(document.getElementById('intersectionAB').value) || 0;
            const intersectionAC = parseInt(document.getElementById('intersectionAC').value) || 0;
            const intersectionBC = parseInt(document.getElementById('intersectionBC').value) || 0;
            const intersectionABC = parseInt(document.getElementById('intersectionABC').value) || 0;

            const colorA = document.getElementById('colorA').value;
            const colorB = document.getElementById('colorB').value;
            const colorC = document.getElementById('colorC').value;

            let data;
            
            if (sizeC > 0) {
                data = [
                    { sets: [nameA], size: sizeA, label: nameA },
                    { sets: [nameB], size: sizeB, label: nameB },
                    { sets: [nameC], size: sizeC, label: nameC },
                    { sets: [nameA, nameB], size: intersectionAB },
                    { sets: [nameA, nameC], size: intersectionAC },
                    { sets: [nameB, nameC], size: intersectionBC },
                    { sets: [nameA, nameB, nameC], size: intersectionABC }
                ];
            } else {
                data = [
                    { sets: [nameA], size: sizeA, label: nameA },
                    { sets: [nameB], size: sizeB, label: nameB },
                    { sets: [nameA, nameB], size: intersectionAB }
                ];
            }

            renderizarVenn(data, [colorA, colorB, colorC]);
            mostrarEstatisticas(data);

        } catch (error) {
            console.error('❌ Erro:', error);
            alert('Erro: ' + error.message);
        }
    }

    // ============================================
    // RENDERIZAR VENN DIAGRAM (VERSÃO OFICIAL)
    // ============================================

    function renderizarVenn(data, colors = ['#FF6B6B', '#4ECDC4', '#45B7D1']) {
        console.log('📊 Tentando renderizar com venn.js...');
        
        try {
            // Verificar se VennDiagram existe
            if (typeof venn.VennDiagram !== 'function') {
                throw new Error('venn.VennDiagram não disponível');
            }

            const container = document.getElementById('venn-container');
            container.innerHTML = '<div id="venn"></div>';

            // Criar e configurar chart
            const chart = venn.VennDiagram()
                .width(800)
                .height(600);

            console.log('Chart criado:', chart);

            // Renderizar
            const svg = d3.select("#venn")
                .datum(data)
                .call(chart);

            console.log('SVG renderizado');

            // Customizar cores
            const colorScale = d3.scaleOrdinal()
                .domain(data.filter(d => d.sets.length === 1).map(d => d.sets[0]))
                .range(colors);

            // Estilizar círculos
            svg.selectAll("path")
                .style("fill", d => {
                    if (d.sets.length === 1) {
                        const set = d.sets[0];
                        return colorScale(set);
                    }
                    return colorScale(d.sets[0]);
                })
                .style("fill-opacity", 0.6)
                .style("stroke", "white")
                .style("stroke-width", 3);

            // Estilizar textos
            svg.selectAll("text")
                .style("fill", "white")
                .style("font-size", "16px")
                .style("font-weight", "bold")
                .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)");

            // Hover effects
            svg.selectAll("g")
                .on("mouseover", function() {
                    d3.select(this).select("path")
                        .transition()
                        .duration(200)
                        .style("fill-opacity", 0.8);
                })
                .on("mouseout", function() {
                    d3.select(this).select("path")
                        .transition()
                        .duration(200)
                        .style("fill-opacity", 0.6);
                });

            console.log('✅ Diagrama renderizado com sucesso!');

        } catch (error) {
            console.error('❌ Erro com venn.js:', error);
            console.log('⚠️ Usando fallback simples...');
            renderizarVennSimples(data, colors);
        }
    }

    // ============================================
    // FALLBACK: RENDERIZAÇÃO SIMPLES
    // ============================================

    function renderizarVennSimples(data, colors = ['#FF6B6B', '#4ECDC4', '#45B7D1']) {
        console.log('📊 Renderizando versão simples (fallback)...');
        
        const container = document.getElementById('venn-container');
        container.innerHTML = '<div id="venn"></div>';

        const width = 800;
        const height = 600;

        const svg = d3.select("#venn")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const conjuntos = data.filter(d => d.sets.length === 1);
        const numConjuntos = conjuntos.length;

        if (numConjuntos === 2) {
            const raio = 150;
            const distancia = 200;

            // Círculo A
            svg.append("circle")
                .attr("cx", width/2 - distancia/2)
                .attr("cy", height/2)
                .attr("r", raio)
                .style("fill", colors[0])
                .style("fill-opacity", 0.6)
                .style("stroke", "white")
                .style("stroke-width", 3);

            // Círculo B
            svg.append("circle")
                .attr("cx", width/2 + distancia/2)
                .attr("cy", height/2)
                .attr("r", raio)
                .style("fill", colors[1])
                .style("fill-opacity", 0.6)
                .style("stroke", "white")
                .style("stroke-width", 3);

            // Labels
            svg.append("text")
                .attr("x", width/2 - distancia/2 - 80)
                .attr("y", height/2)
                .attr("text-anchor", "middle")
                .style("fill", "white")
                .style("font-size", "18px")
                .style("font-weight", "bold")
                .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                .text(`${conjuntos[0].label || conjuntos[0].sets[0]}`);

            svg.append("text")
                .attr("x", width/2 - distancia/2 - 80)
                .attr("y", height/2 + 25)
                .attr("text-anchor", "middle")
                .style("fill", "white")
                .style("font-size", "14px")
                .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                .text(`(${conjuntos[0].size})`);

            svg.append("text")
                .attr("x", width/2 + distancia/2 + 80)
                .attr("y", height/2)
                .attr("text-anchor", "middle")
                .style("fill", "white")
                .style("font-size", "18px")
                .style("font-weight", "bold")
                .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                .text(`${conjuntos[1].label || conjuntos[1].sets[0]}`);

            svg.append("text")
                .attr("x", width/2 + distancia/2 + 80)
                .attr("y", height/2 + 25)
                .attr("text-anchor", "middle")
                .style("fill", "white")
                .style("font-size", "14px")
                .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                .text(`(${conjuntos[1].size})`);

            // Interseção
            const intersecao = data.find(d => d.sets.length === 2);
            if (intersecao) {
                svg.append("text")
                    .attr("x", width/2)
                    .attr("y", height/2)
                    .attr("text-anchor", "middle")
                    .style("fill", "white")
                    .style("font-size", "24px")
                    .style("font-weight", "bold")
                    .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                    .text(intersecao.size);
            }

        } else if (numConjuntos === 3) {
            // Três círculos
            const raio = 130;
            const positions = [
                { x: width/2, y: height/2 - 80 },
                { x: width/2 - 120, y: height/2 + 80 },
                { x: width/2 + 120, y: height/2 + 80 }
            ];

            conjuntos.forEach((d, i) => {
                svg.append("circle")
                    .attr("cx", positions[i].x)
                    .attr("cy", positions[i].y)
                    .attr("r", raio)
                    .style("fill", colors[i])
                    .style("fill-opacity", 0.6)
                    .style("stroke", "white")
                    .style("stroke-width", 3);

                const labelOffset = i === 0 ? -raio-30 : (i === 1 ? -raio-30 : raio+30);
                svg.append("text")
                    .attr("x", positions[i].x + (i === 0 ? 0 : labelOffset))
                    .attr("y", positions[i].y + (i === 0 ? -raio-20 : raio+30))
                    .attr("text-anchor", "middle")
                    .style("fill", "white")
                    .style("font-size", "16px")
                    .style("font-weight", "bold")
                    .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                    .text(`${d.label || d.sets[0]}: ${d.size}`);
            });

            const intersecaoABC = data.find(d => d.sets.length === 3);
            if (intersecaoABC && intersecaoABC.size > 0) {
                svg.append("text")
                    .attr("x", width/2)
                    .attr("y", height/2)
                    .attr("text-anchor", "middle")
                    .style("fill", "white")
                    .style("font-size", "20px")
                    .style("font-weight", "bold")
                    .style("text-shadow", "2px 2px 4px rgba(0,0,0,0.7)")
                    .text(intersecaoABC.size);
            }
        }

        console.log('✅ Versão simples renderizada!');
    }

    // ============================================
    // OUTRAS FUNÇÕES (continuam iguais)
    // ============================================

    function mostrarEstatisticas(data) {
        const statsDiv = document.getElementById('stats');
        statsDiv.style.display = 'grid';
        
        let html = '';
        data.forEach(item => {
            const label = item.sets.join(' ∩ ');
            html += `
                <div class="stat-item">
                    <div class="stat-label">${label}</div>
                    <div class="stat-value">${item.size.toLocaleString('pt-BR')}</div>
                </div>
            `;
        });
        
        statsDiv.innerHTML = html;
    }

    function gerarDeListas() {
        const nameA = document.getElementById('listNameA').value || 'A';
        const nameB = document.getElementById('listNameB').value || 'B';
        const nameC = document.getElementById('listNameC').value || 'C';

        const listA = processarLista(document.getElementById('listA').value);
        const listB = processarLista(document.getElementById('listB').value);
        const listC = processarLista(document.getElementById('listC').value);

        const setA = new Set(listA);
        const setB = new Set(listB);
        const setC = new Set(listC);

        const intersectionAB = new Set([...setA].filter(x => setB.has(x)));
        const intersectionAC = new Set([...setA].filter(x => setC.has(x)));
        const intersectionBC = new Set([...setB].filter(x => setC.has(x)));
        const intersectionABC = new Set([...intersectionAB].filter(x => setC.has(x)));

        let data;
        
        if (listC.length > 0) {
            data = [
                { sets: [nameA], size: setA.size, label: nameA },
                { sets: [nameB], size: setB.size, label: nameB },
                { sets: [nameC], size: setC.size, label: nameC },
                { sets: [nameA, nameB], size: intersectionAB.size },
                { sets: [nameA, nameC], size: intersectionAC.size },
                { sets: [nameB, nameC], size: intersectionBC.size },
                { sets: [nameA, nameB, nameC], size: intersectionABC.size }
            ];
        } else {
            data = [
                { sets: [nameA], size: setA.size, label: nameA },
                { sets: [nameB], size: setB.size, label: nameB },
                { sets: [nameA, nameB], size: intersectionAB.size }
            ];
        }

        renderizarVenn(data);
        mostrarEstatisticas(data);
    }

    function processarLista(texto) {
        if (!texto.trim()) return [];
        return texto
            .split(/[\n,;]+/)
            .map(x => x.trim())
            .filter(x => x.length > 0);
    }

    function carregarExemplo(tipo) {
        const exemplos = {
            marketing: {
                nameA: 'Email Marketing', sizeA: 5000, colorA: '#FF6B6B',
                nameB: 'Social Media', sizeB: 8000, colorB: '#4ECDC4',
                nameC: 'Anúncios Pagos', sizeC: 3000, colorC: '#45B7D1',
                intersectionAB: 1500, intersectionAC: 800,
                intersectionBC: 1000, intersectionABC: 400
            },
            produtos: {
                nameA: 'Eletrônicos', sizeA: 450, colorA: '#9B59B6',
                nameB: 'Casa & Decoração', sizeB: 620, colorB: '#3498DB',
                nameC: 'Moda', sizeC: 780, colorC: '#E74C3C',
                intersectionAB: 120, intersectionAC: 90,
                intersectionBC: 150, intersectionABC: 45
            },
            clientes: {
                nameA: 'Premium', sizeA: 250, colorA: '#F39C12',
                nameB: 'Regular', sizeB: 1500, colorB: '#2ECC71',
                nameC: 'Ocasional', sizeC: 3000, colorC: '#95A5A6',
                intersectionAB: 80, intersectionAC: 30,
                intersectionBC: 200, intersectionABC: 15
            },
            habilidades: {
                nameA: 'Frontend', sizeA: 25, colorA: '#E67E22',
                nameB: 'Backend', sizeB: 30, colorB: '#16A085',
                nameC: 'DevOps', sizeC: 15, colorC: '#2C3E50',
                intersectionAB: 8, intersectionAC: 5,
                intersectionBC: 6, intersectionABC: 3
            },
            canais: {
                nameA: 'Loja Física', sizeA: 12000, colorA: '#E74C3C',
                nameB: 'E-commerce', sizeB: 18000, colorB: '#3498DB',
                nameC: 'App Mobile', sizeC: 8000, colorC: '#9B59B6',
                intersectionAB: 4000, intersectionAC: 2000,
                intersectionBC: 3000, intersectionABC: 1000
            }
        };

        const exemplo = exemplos[tipo];
        if (exemplo) {
            Object.keys(exemplo).forEach(key => {
                const el = document.getElementById(key);
                if (el) el.value = exemplo[key];
            });
            
            ['A', 'B', 'C'].forEach(set => {
                document.getElementById(`color${set}-hex`).textContent = exemplo[`color${set}`];
            });

            switchTab('manual');
            document.querySelector('.tab').click();
            
            setTimeout(gerarDiagrama, 300);
        }
    }

    function limparFormulario() {
        ['nameA', 'nameB', 'nameC', 'sizeA', 'sizeB', 'sizeC',
         'intersectionAB', 'intersectionAC', 'intersectionBC', 'intersectionABC'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        
        document.getElementById('venn-container').innerHTML = `
            <div class="placeholder">
                <svg viewBox="0 0 200 200">
                    <circle cx="70" cy="100" r="60" fill="#667eea" opacity="0.3"/>
                    <circle cx="130" cy="100" r="60" fill="#764ba2" opacity="0.3"/>
                </svg>
                <p>Preencha os dados ao lado e clique em "Gerar Diagrama"</p>
            </div>
        `;
        
        document.getElementById('stats').style.display = 'none';
    }

    function exportarSVG() {
        const svgElement = document.querySelector('#venn svg');
        if (!svgElement) {
            alert('Gere um diagrama primeiro!');
            return;
        }

        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svgElement);
        const blob = new Blob([svgString], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'venn-diagram.svg';
        a.click();
        
        URL.revokeObjectURL(url);
    }

    function exportarPNG() {
        const svgElement = document.querySelector('#venn svg');
        if (!svgElement) {
            alert('Gere um diagrama primeiro!');
            return;
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const svgData = new XMLSerializer().serializeToString(svgElement);
        
        const img = new Image();
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = function() {
            canvas.width = img.width * 2;
            canvas.height = img.height * 2;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'venn-diagram.png';
                a.click();
                URL.revokeObjectURL(url);
            });
            
            URL.revokeObjectURL(url);
        };
        
        img.src = url;
    }

    // Carregar exemplo inicial
    window.addEventListener('load', () => {
        carregarExemplo('marketing');
    });
</script>
